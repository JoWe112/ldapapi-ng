# Default values for ldapapi-ng.
# See README.md for a full walk-through of auth topologies and examples.

# -- Number of replicas. Set >=2 behind a PDB for HA.
replicaCount: 2

image:
  # -- Container image repository (no tag).
  repository: core.51335.xyz/2025/ldapapi-ng
  # -- Image pull policy.
  pullPolicy: IfNotPresent
  # -- Image tag. Defaults to `.Chart.AppVersion` if left empty.
  tag: ""

# -- Image pull secrets for private registries.
imagePullSecrets: []

# -- Override the chart name.
nameOverride: ""
# -- Override the fully qualified app name.
fullnameOverride: ""

serviceAccount:
  # -- Create a dedicated ServiceAccount for the workload.
  create: true
  # -- Annotations to add to the ServiceAccount.
  annotations: {}
  # -- ServiceAccount name. Autogenerated if empty.
  name: ""

# --------------------------------------------------------------------------
# Authentication mode
# --------------------------------------------------------------------------
#
# gateway    — an upstream API gateway (e.g. KrakenD) handles authentication.
#              The API must only be reachable from the gateway; a NetworkPolicy
#              enforces this. Ingress/HTTPRoute must be disabled in this mode.
# standalone — the API enforces HTTP Basic Auth itself by performing an LDAP
#              bind. Ingress or HTTPRoute may be enabled to expose it directly.
#
auth:
  mode: gateway

# --------------------------------------------------------------------------
# LDAP configuration
# --------------------------------------------------------------------------
ldap:
  # -- LDAPS hostname (required).
  host: ""
  # -- LDAPS port.
  port: 636
  # -- Base DN for user searches (required).
  baseDN: ""
  # -- Service account DN used to search the directory for the end-user's DN
  # before binding as them. Required when the directory forbids anonymous
  # search (Active Directory and most hardened OpenLDAP deployments); leave
  # empty only if anonymous search is allowed. This is unrelated to which
  # `auth.mode` the API runs in.
  bindDN: ""
  # -- Password for the service account. If set, rendered into a Secret.
  bindPassword: ""
  # -- LDAP user search filter; %s is replaced by the uid.
  userFilter: "(uid=%s)"
  # -- Dial / operation timeout.
  timeout: 10s

  # CA certificate used to verify the LDAPS server certificate.
  caCert:
    # -- Mount a CA cert for LDAPS verification.
    enabled: false
    # -- PEM-encoded CA certificate content. Rendered into a ConfigMap.
    # -- Mutually exclusive with `existingConfigMap`.
    content: ""
    # -- Name of an existing ConfigMap that holds the CA cert under `ca.crt`.
    existingConfigMap: ""
    # -- Mount path (must match what the app reads from LDAP_CA_CERT_PATH).
    mountPath: /etc/ldapapi-ng/ca
    # -- File name of the CA cert inside the mount.
    fileName: ca.crt

# --------------------------------------------------------------------------
# API behaviour
# --------------------------------------------------------------------------
api:
  # -- HTTP listen address inside the container.
  listenAddr: ":8080"
  # -- Expose /swagger/*. Must stay false in production.
  swaggerEnabled: false

# --------------------------------------------------------------------------
# Service
# --------------------------------------------------------------------------
service:
  type: ClusterIP
  port: 8080
  # -- Named service port used by probes and the Ingress/HTTPRoute.
  portName: http

# --------------------------------------------------------------------------
# Ingress (standalone mode only)
# --------------------------------------------------------------------------
ingress:
  # -- Enable Ingress. Forbidden when auth.mode == "gateway".
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ldapapi.example.org
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - hosts:
  #      - ldapapi.example.org
  #    secretName: ldapapi-ng-tls

# --------------------------------------------------------------------------
# Gateway API HTTPRoute (standalone mode only)
# --------------------------------------------------------------------------
httpRoute:
  # -- Enable HTTPRoute. Forbidden when auth.mode == "gateway".
  enabled: false
  # -- Parent Gateway reference(s).
  parentRefs: []
  #  - name: default
  #    namespace: gateway-system
  #    sectionName: https
  hostnames:
    - ldapapi.example.org

# --------------------------------------------------------------------------
# NetworkPolicy
# --------------------------------------------------------------------------
#
# In gateway mode, a default-deny + allow-from-gateway policy is required.
# In standalone mode the policy is optional (off by default).
#
networkPolicy:
  # -- Create a NetworkPolicy. Forced on in gateway mode.
  enabled: false
  # -- Namespace selector matching the API gateway's namespace.
  gatewayNamespaceSelector:
    matchLabels:
      kubernetes.io/metadata.name: krakend
  # -- Pod selector matching the API gateway's pods within that namespace.
  gatewayPodSelector:
    matchLabels:
      app.kubernetes.io/name: krakend

# --------------------------------------------------------------------------
# Pod scheduling / resilience
# --------------------------------------------------------------------------
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 500m
    memory: 256Mi

# -- Liveness probe on /health.
livenessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 5
  periodSeconds: 10
  timeoutSeconds: 2
  failureThreshold: 3

# -- Readiness probe on /health.
readinessProbe:
  httpGet:
    path: /health
    port: http
  initialDelaySeconds: 2
  periodSeconds: 5
  timeoutSeconds: 2
  failureThreshold: 3

# -- Pod-level security context. OpenShift ignores runAsUser and assigns a
# -- random UID from the namespace range; vanilla K8s falls back to the image
# -- USER directive (1001). Leave runAsUser unset for portability.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

# -- Container-level security context. Kept strict for OpenShift restricted-v2.
securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

# -- Extra environment variables passed directly to the container.
extraEnv: []
#  - name: EXTRA_KEY
#    value: "some-value"

# -- Extra volumes.
extraVolumes: []
# -- Extra volume mounts.
extraVolumeMounts: []

# -- PodDisruptionBudget. Enable when running >=2 replicas.
podDisruptionBudget:
  enabled: false
  minAvailable: 1
  # maxUnavailable: 1

# -- Node selector.
nodeSelector: {}
# -- Tolerations.
tolerations: []
# -- Affinity rules.
affinity: {}
