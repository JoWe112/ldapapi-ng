apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "ldapapi-ng.fullname" . }}
  labels:
    {{- include "ldapapi-ng.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      {{- include "ldapapi-ng.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "ldapapi-ng.selectorLabels" . | nindent 8 }}
      annotations:
        # Force a rollout whenever env-producing config changes.
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        {{- if .Values.ldap.bindPassword }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- end }}
        {{- if and .Values.ldap.caCert.enabled .Values.ldap.caCert.content }}
        checksum/ca: {{ include (print $.Template.BasePath "/ca-configmap.yaml") . | sha256sum }}
        {{- end }}
    spec:
      serviceAccountName: {{ include "ldapapi-ng.serviceAccountName" . }}
      automountServiceAccountToken: false
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          image: {{ include "ldapapi-ng.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: {{ .Values.service.portName }}
              containerPort: 8080
              protocol: TCP
          envFrom:
            - configMapRef:
                name: {{ include "ldapapi-ng.fullname" . }}-env
            {{- if .Values.ldap.bindPassword }}
            - secretRef:
                name: {{ include "ldapapi-ng.fullname" . }}-ldap
            {{- end }}
          {{- with .Values.extraEnv }}
          env:
            {{- toYaml . | nindent 12 }}
          {{- end }}
          livenessProbe:
            {{- toYaml .Values.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.readinessProbe | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          volumeMounts:
            # /tmp is writable because HOME=/tmp and rootfs is read-only.
            - name: tmp
              mountPath: /tmp
            {{- if .Values.ldap.caCert.enabled }}
            - name: ldap-ca
              mountPath: {{ .Values.ldap.caCert.mountPath }}
              readOnly: true
            {{- end }}
            {{- with .Values.extraVolumeMounts }}
            {{- toYaml . | nindent 12 }}
            {{- end }}
      volumes:
        - name: tmp
          emptyDir: {}
        {{- if .Values.ldap.caCert.enabled }}
        - name: ldap-ca
          configMap:
            name: {{ if .Values.ldap.caCert.existingConfigMap }}{{ .Values.ldap.caCert.existingConfigMap }}{{ else }}{{ include "ldapapi-ng.fullname" . }}-ca{{ end }}
        {{- end }}
        {{- with .Values.extraVolumes }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
