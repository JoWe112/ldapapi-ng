# Example Secret for the KrakenD gateway. Copy, rename, and populate with
# real values before applying — never commit the populated version.
#
# Fields
# ------
#   LDAPAPI_UPSTREAM
#     Full URL to the ldapapi-ng Service, e.g.
#       http://ldapapi-ng.ldapapi-ng.svc.cluster.local:8080
#
#   KEYCLOAK_JWKS_URL
#     JWKS endpoint of your Keycloak realm, e.g.
#       https://keycloak.example.org/realms/my-realm/protocol/openid-connect/certs
#
#   KEYCLOAK_ISSUER
#     Issuer claim that KrakenD compares against `iss` on the token, e.g.
#       https://keycloak.example.org/realms/my-realm
#
#   KEYCLOAK_AUDIENCE
#     Client ID that is expected in the `aud` claim, e.g. "ldapapi-ng".
#
#   KRAKEND_API_KEYS_JSON
#     Raw JSON array substituted into the config at startup (Flexible Config).
#     Each entry must have `key` and `roles`. Keep this opaque to avoid
#     accidentally logging keys.
apiVersion: v1
kind: Secret
metadata:
  name: krakend-secrets
  labels:
    app.kubernetes.io/name: krakend
    app.kubernetes.io/part-of: ldapapi-ng
type: Opaque
stringData:
  LDAPAPI_UPSTREAM: "http://ldapapi-ng.ldapapi-ng.svc.cluster.local:8080"
  KEYCLOAK_JWKS_URL: "https://keycloak.example.org/realms/my-realm/protocol/openid-connect/certs"
  KEYCLOAK_ISSUER: "https://keycloak.example.org/realms/my-realm"
  KEYCLOAK_AUDIENCE: "ldapapi-ng"
  KRAKEND_API_KEYS_JSON: |-
    [
      {
        "key": "REPLACE_ME_WITH_A_LONG_RANDOM_STRING",
        "roles": ["ldapapi-user"]
      }
    ]
