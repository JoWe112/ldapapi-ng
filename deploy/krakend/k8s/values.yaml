# Values override for the upstream KrakenD Helm chart maintained by Equinix Metal
# (https://github.com/equinixmetal-helm/krakend). Install with:
#
#   helm repo add equinixmetal https://helm.equinixmetal.com
#   helm repo update
#   kubectl create secret generic krakend-secrets -n krakend \
#     --from-literal=LDAPAPI_UPSTREAM=http://ldapapi-ng.ldapapi-ng.svc.cluster.local:8080 \
#     --from-literal=KEYCLOAK_JWKS_URL=https://keycloak.example.org/realms/myrealm/protocol/openid-connect/certs \
#     --from-literal=KEYCLOAK_ISSUER=https://keycloak.example.org/realms/myrealm \
#     --from-literal=KEYCLOAK_AUDIENCE=ldapapi-ng \
#     --from-literal='KRAKEND_API_KEYS_JSON=[{"key":"changeme","roles":["ldapapi-user"]}]'
#   helm install krakend equinixmetal/krakend \
#     --namespace krakend --create-namespace \
#     -f values.yaml
#
# Label alignment with ldapapi-ng's NetworkPolicy
# ------------------------------------------------
# The ldapapi-ng chart's NetworkPolicy (gateway mode) pins ingress to pods
# matching:
#
#   namespaceSelector: kubernetes.io/metadata.name=krakend
#   podSelector:       app.kubernetes.io/name=krakend
#
# The defaults below keep those labels intact — do not rename the release or
# override `nameOverride` without also updating the ldapapi-ng values.

replicaCount: 2

image:
  registry: docker.io
  repository: devopsfaith/krakend
  tag: "2.10"
  pullPolicy: IfNotPresent

# ---------------------------------------------------------------------------
# KrakenD configuration
# ---------------------------------------------------------------------------
# The chart creates a ConfigMap named `krakend-config` from krakend.config,
# mounts it at /etc/krakend-src/config/krakend.tmpl, and sets FC_ENABLE=1 so
# Flexible Config renders {{ env "VAR" }} placeholders at startup. We only
# need to supply the template and the Secret holding the env vars.
krakend:
  # Inline the full Flexible Config template. The chart renders this into the
  # krakend-config ConfigMap and mounts it automatically — no manual
  # `kubectl apply` needed.
  config: |
    {
      "$schema": "https://www.krakend.io/schema/v2.8/krakend.json",
      "version": 3,
      "name": "ldapapi-ng-gateway",
      "port": 8080,
      "timeout": "15s",
      "cache_ttl": "0s",
      "output_encoding": "no-op",
      "extra_config": {
        "telemetry/logging": {
          "level": "INFO",
          "prefix": "[KRAKEND]",
          "syslog": false,
          "stdout": true,
          "format": "default"
        },
        "security/http": {
          "allowed_hosts": [],
          "ssl_proxy_headers": {
            "X-Forwarded-Proto": "https"
          },
          "sts_seconds": 31536000,
          "sts_include_subdomains": true,
          "frame_deny": true,
          "content_type_nosniff": true,
          "browser_xss_filter": true,
          "referrer_policy": "no-referrer",
          "content_security_policy": "default-src 'none'"
        },
        "router": {
          "disable_access_log": false,
          "return_error_msg": false,
          "remove_single_element_collections": true
        }
      },
      "endpoints": [
        {
          "endpoint": "/health",
          "method": "GET",
          "output_encoding": "no-op",
          "backend": [
            {
              "url_pattern": "/health",
              "method": "GET",
              "encoding": "no-op",
              "host": [
                "{{ env "LDAPAPI_UPSTREAM" }}"
              ]
            }
          ]
        },
        {
          "endpoint": "/v1/auth",
          "method": "POST",
          "output_encoding": "no-op",
          "input_headers": [
            "Authorization",
            "Content-Type"
          ],
          "extra_config": {
            "auth/validator": {
              "alg": "RS256",
              "jwk_url": "{{ env "KEYCLOAK_JWKS_URL" }}",
              "issuer": "{{ env "KEYCLOAK_ISSUER" }}",
              "audience": [
                "{{ env "KEYCLOAK_AUDIENCE" }}"
              ],
              "cache": true,
              "disable_jwk_security": false,
              "roles_key": "realm_access.roles",
              "roles": [
                "ldapapi-user"
              ],
              "propagate_claims": [
                ["preferred_username", "x-forwarded-user"]
              ]
            }
          },
          "backend": [
            {
              "url_pattern": "/v1/auth",
              "method": "POST",
              "encoding": "no-op",
              "host": [
                "{{ env "LDAPAPI_UPSTREAM" }}"
              ]
            }
          ]
        },
        {
          "endpoint": "/v1/user/{uid}",
          "method": "GET",
          "output_encoding": "no-op",
          "extra_config": {
            "auth/validator": {
              "alg": "RS256",
              "jwk_url": "{{ env "KEYCLOAK_JWKS_URL" }}",
              "issuer": "{{ env "KEYCLOAK_ISSUER" }}",
              "audience": [
                "{{ env "KEYCLOAK_AUDIENCE" }}"
              ],
              "cache": true,
              "disable_jwk_security": false,
              "roles_key": "realm_access.roles",
              "roles": [
                "ldapapi-user"
              ]
            }
          },
          "backend": [
            {
              "url_pattern": "/v1/user/{uid}",
              "method": "GET",
              "encoding": "no-op",
              "host": [
                "{{ env "LDAPAPI_UPSTREAM" }}"
              ]
            }
          ]
        },
        {
          "endpoint": "/apikey/v1/auth",
          "method": "POST",
          "output_encoding": "no-op",
          "input_headers": [
            "Authorization",
            "Content-Type",
            "X-API-Key"
          ],
          "extra_config": {
            "auth/api-keys": {
              "strategy": "header",
              "identifier": "X-API-Key",
              "roles": [
                "ldapapi-user"
              ],
              "keys": {{ env "KRAKEND_API_KEYS_JSON" }}
            }
          },
          "backend": [
            {
              "url_pattern": "/v1/auth",
              "method": "POST",
              "encoding": "no-op",
              "host": [
                "{{ env "LDAPAPI_UPSTREAM" }}"
              ]
            }
          ]
        },
        {
          "endpoint": "/apikey/v1/user/{uid}",
          "method": "GET",
          "output_encoding": "no-op",
          "input_headers": [
            "X-API-Key"
          ],
          "extra_config": {
            "auth/api-keys": {
              "strategy": "header",
              "identifier": "X-API-Key",
              "roles": [
                "ldapapi-user"
              ],
              "keys": {{ env "KRAKEND_API_KEYS_JSON" }}
            }
          },
          "backend": [
            {
              "url_pattern": "/v1/user/{uid}",
              "method": "GET",
              "encoding": "no-op",
              "host": [
                "{{ env "LDAPAPI_UPSTREAM" }}"
              ]
            }
          ]
        }
      ]
    }

  # Disable the default partials that ship with the chart — our config is
  # self-contained and does not reference any partials.
  partials: {}
  templates: {}

  # Env vars from the Secret — the chart injects these into the container so
  # Flexible Config can resolve {{ env "VAR" }} at startup.
  envFromSecret: krakend-secrets

# Hardened pod security context — mirror the ldapapi-ng chart so both
# workloads pass restricted-v2 SCC on OpenShift.
podSecurityContext:
  runAsNonRoot: true
  fsGroup: 0
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1
    memory: 512Mi

service:
  type: ClusterIP
  port: 8080

# TLS termination happens at an Ingress or HTTPRoute in front of KrakenD — the
# gateway itself only speaks HTTP inside the cluster. Configure the relevant
# block depending on your ingress flavour.
ingress:
  enabled: false
  className: ""
  annotations: {}
  hosts:
    - host: ldapapi.example.org
      paths:
        - path: /
          pathType: Prefix
  tls: []
  #  - hosts:
  #      - ldapapi.example.org
  #    secretName: ldapapi-tls
